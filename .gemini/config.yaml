have_fun: false

memory_config:
  disabled: true

code_review:
  disable: false
  comment_severity_threshold: MEDIUM
  max_review_comments: 15
  pull_request_opened:
    help: false
    summary: false
    code_review: true
    include_drafts: false

ignore_patterns:
  - "**/dist/**"
  - "**/build/**"
  - "**/coverage/**"
  - "**/.next/**"
  - "**/.turbo/**"
  - "**/.terraform/**"
  - "**/vendor/**"
  - "**/generated/**"
  - "**/__snapshots__/**"
  - "**/*.min.*"
