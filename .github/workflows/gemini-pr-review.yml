name: Gemini PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  gemini-review:
    if: ${{ github.event.pull_request.draft == false && github.event.pull_request.head.repo.fork == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GCP_PROJECT_ID: pai-infrastructure
      GCP_LOCATION: global
    steps:
      - name: Validate Gemini prerequisites
        id: prerequisites
        shell: bash
        run: |
          set -euo pipefail
          ready=true
          if [ -z "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ]; then
            echo "Skipping Gemini review: missing GCP_WORKLOAD_IDENTITY_PROVIDER."
            ready=false
          fi
          if [ -z "${{ secrets.GCP_PLAN_SERVICE_ACCOUNT }}" ] && [ -z "${{ secrets.GCP_SERVICE_ACCOUNT }}" ]; then
            echo "Skipping Gemini review: missing GCP_PLAN_SERVICE_ACCOUNT and GCP_SERVICE_ACCOUNT."
            ready=false
          fi
          echo "ready=${ready}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        if: ${{ steps.prerequisites.outputs.ready == 'true' }}
        uses: actions/checkout@v4

      - name: Verify Vertex secrets are available
        id: preflight
        shell: bash
        env:
          GCP_WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_PLAN_SERVICE_ACCOUNT || secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          if [[ -z "${GCP_WIF_PROVIDER}" || -z "${GCP_SERVICE_ACCOUNT}" ]]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Vertex secrets are unavailable in this context; skipping Gemini review."
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP (WIF)
        if: steps.preflight.outputs.ready == 'true'
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_PLAN_SERVICE_ACCOUNT || secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Resolve Gemini model fallback
        if: steps.preflight.outputs.ready == 'true'
        id: model
        shell: bash
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          set -euo pipefail

          candidates=(
            "gemini-3.1-flash-lite-preview"
            "gemini-3-flash-preview"
            "gemini-2.5-flash-lite"
          )
          probe_files=()

          if [[ "${GCP_LOCATION}" == "global" ]]; then
            host="aiplatform.googleapis.com"
          else
            host="${GCP_LOCATION}-aiplatform.googleapis.com"
          fi

          for m in "${candidates[@]}"; do
            safe_model="${m//[^a-zA-Z0-9._-]/_}"
            probe_file="/tmp/model_probe_${safe_model}.json"
            probe_files+=("${probe_file}")
            url="https://${host}/v1/projects/${GCP_PROJECT_ID}/locations/${GCP_LOCATION}/publishers/google/models/${m}:generateContent"
            code="$(
              curl -sS -o "${probe_file}" -w "%{http_code}" \
                -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{"contents":[{"role":"user","parts":[{"text":"ping"}]}]}' \
                "${url}"
            )"

            if [[ "${code}" == "200" ]]; then
              echo "model=${m}" >> "$GITHUB_OUTPUT"
              echo "Selected model: ${m}"
              exit 0
            fi

            echo "Model unavailable: ${m} (HTTP ${code}); details in ${probe_file}"
          done

          echo "No candidate Gemini model is available in Vertex for ${GCP_PROJECT_ID}/${GCP_LOCATION}."
          for f in "${probe_files[@]}"; do
            echo "--- ${f} ---"
            cat "${f}" || true
          done
          exit 1

      - name: Run Gemini pull request review
        if: steps.preflight.outputs.ready == 'true'
        uses: google-github-actions/run-gemini-cli@v0.1.21
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE_TITLE: ${{ github.event.pull_request.title }}
          ISSUE_BODY: ${{ github.event.pull_request.body }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        with:
          gcp_project_id: ${{ env.GCP_PROJECT_ID }}
          gcp_location: ${{ env.GCP_LOCATION }}
          gcp_workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp_service_account: ${{ secrets.GCP_PLAN_SERVICE_ACCOUNT || secrets.GCP_SERVICE_ACCOUNT }}
          use_vertex_ai: "true"
          gemini_model: ${{ steps.model.outputs.model }}
          workflow_name: gemini-review
          settings: |-
            {
              "model": {
                "maxSessionTurns": 100
              },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "includeTools": [
                    "add_comment_to_pending_review",
                    "pull_request_read",
                    "pull_request_review_write"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              },
              "tools": {
                "core": [
                  "run_shell_command(cat)",
                  "run_shell_command(echo)",
                  "run_shell_command(grep)",
                  "run_shell_command(head)",
                  "run_shell_command(tail)"
                ]
              }
            }
          prompt: /gemini-review

      - name: Skip Gemini review (missing secrets)
        if: steps.preflight.outputs.ready != 'true'
        run: echo "Skipping Gemini review because required Vertex secrets are not available."
